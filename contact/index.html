<html>
<head>
<title>Contact</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
<div class="contact-header">
		<h1>Say Hello !!</h1>
		<h2>Send a Message!</h2>
</div>
<div class="contact-form">
	<form id="contact-form" method="post" action="contact-form-handle.php">
	<input name="name" type="text" class="form-control" placeholder="Your Name" required><br/>
	<input name="email" type="email" class="form-control" placeholder="Your Email Id" required><br/>
	<input name="mobile" type="mobile" class="form-control" placeholder="Your Mobile Number" required><br/>
	<textarea name="message" class="form-control" placeholder="Message" row="4" required></textarea><br/>
	
	<input type="submit" class="form-control submit" value="Send Message">
	
				
</body>
</html>
